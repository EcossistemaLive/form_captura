      answers['data_envio'] = new Date().toISOString();

      // 1. Envio para o Webhook do Google Sheets (Fluxo Atual)
      try {
        console.log("Enviando dados do diagnÃ³stico para o webhook:", answers);

        if (WEBHOOK_URL !== "SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI") {
          await fetch(WEBHOOK_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(answers)
          });
        } else {
          console.log("Modo Sandbox - Respostas:", answers);
          await new Promise(r => setTimeout(r, 1000));
        }
      } catch (error) {
        console.error("Erro ao enviar para o Google Sheets:", error);
      }

      // 2. Envio para o DataCrazy CRM
      try {
        if (DC_CONFIG.API_KEY !== 'SUA_CHAVE_DATACRAZY_AQUI' && DC_CONFIG.STAGE_ID !== 'UUID-DO-ESTAGIO-DO-FUNIL') {
          console.log("Enviando dados para o DataCrazy CRM...");
          let leadId = createdLeadId;
          if (!leadId) {
            leadId = await criarLeadDataCrazy(answers);
            await criarNegocioDataCrazy(leadId);
          }
          await criarNotaDataCrazy(leadId, answers);
          console.log("Lead, NegÃ³cio e Nota criados com sucesso no DataCrazy!");
        } else {
          console.log("DataCrazy em modo Sandbox (sem credenciais configuradas).");
        }
      } catch (error) {
        console.error("Erro ao enviar para o DataCrazy:", error);
      }

      // 3. Pixel da Meta e finalizaÃ§Ã£o da tela
      try {
        if (typeof fbq === 'function') {
          fbq('track', 'Lead');
        }
      } catch (error) {
        console.error("Erro ao disparar Pixel da Meta:", error);
      }

      document.getElementById(`step-${currentStep}`).classList.remove('active');
      document.getElementById('step-thankyou').classList.add('active');
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressText').innerText = '100%';
    }

    document.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        if (document.activeElement.tagName === 'TEXTAREA') return;
        const nextBtn = document.getElementById(`next-${currentStep}`);
        if (nextBtn && !nextBtn.disabled) {
          if (currentStep === questions.length - 1) submitForm();
          else nextStep();
        }
      }
    });

    renderSteps();
  </script>
</body>
</html>
