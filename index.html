<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Diagnóstico Estratégico | ViDi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #0A0A0A;
      --gold: #C9A84C;
      --gold-light: #E8D08A;
      --gold-dim: rgba(201,168,76,0.15);
      --text: #F5F0E8;
      --text-muted: #ABABAB;
      --accent: #7B6EF6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--dark); color: var(--text);
      background-image: linear-gradient(rgba(10,10,10,0.8), rgba(10,10,10,0.9)), url('cavaleiro.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }
    
    /* â”€â”€ HEADER â”€â”€ */
    header {
      padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10;
    }
    .logo { 
      font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; 
      color: var(--gold); letter-spacing: 0.1em; display: flex; align-items: center; gap: 12px;
    }
    .progress-wrap { display: flex; align-items: center; gap: 1rem; }
    .progress-text { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
    .progress-bar { width: 150px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s ease; }

    /* ── CONTAINER ── */
    #app {
      flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; overflow-y: auto; padding: 2rem 1rem;
    }

    /* â”€â”€ STEPS â”€â”€ */
    .step-container {
      width: 100%; max-width: 650px; opacity: 0; transform: translateY(20px); transition: all 0.5s ease;
      position: absolute; pointer-events: none; visibility: hidden; display: flex; flex-direction: column; gap: 2rem;
    }
    .step-container.active {
      opacity: 1; transform: translateY(0); pointer-events: auto; visibility: visible; position: relative; margin: auto 0;
    }
    
    .question-block {
      font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 500; line-height: 1.4; color: var(--text);
    }
    .question-block span.q-num {
      color: var(--gold); font-weight: 700; margin-right: 0.5rem; font-size: 1rem; vertical-align: middle;
    }

    /* â”€â”€ OPTIONS â”€â”€ */
    .options-grid { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1rem; }
    .option-btn {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 1.25rem 1.5rem; font-size: 1rem; color: var(--text); text-align: left;
      cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; gap: 1rem;
    }
    .option-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(201,168,76,0.3); }
    .option-btn.selected { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); font-weight: 500; }
    .option-letter { 
      background: rgba(255,255,255,0.1); width: 24px; height: 24px; border-radius: 4px; 
      display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700;
    }
    .option-btn.selected .option-letter { background: var(--gold); color: var(--dark); }

    /* â”€â”€ INPUTS â”€â”€ */
    .input-wrap { display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem; }
    input[type="text"], input[type="email"], input[type="tel"], textarea {
      background: transparent; border: none; border-bottom: 2px solid rgba(255,255,255,0.2);
      color: var(--gold-light); font-size: 1.5rem; padding: 0.5rem 0; width: 100%; outline: none; transition: border-color 0.3s;
      font-family: 'Inter', sans-serif;
    }
    textarea { font-size: 1.2rem; resize: none; border: 2px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 1rem; background: rgba(255,255,255,0.02); min-height: 120px; }
    input:focus, textarea:focus { border-color: var(--gold); }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.15); }

    /* â”€â”€ NAV BUTTONS â”€â”€ */
    .nav-buttons { display: flex; gap: 1rem; margin-top: 2rem; align-items: center; }
    .btn-next, .btn-submit {
      background: var(--gold); color: var(--dark); border: none; padding: 1rem 2rem; border-radius: 6px;
      font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-next:hover, .btn-submit:hover { opacity: 0.9; }
    .btn-next:disabled, .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .nav-hint { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.4rem; }
    
    .btn-prev {
      background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem;
      padding: 0.5rem; transition: color 0.2s; display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .btn-prev:hover { color: var(--text); }
    
    /* â”€â”€ THANK YOU â”€â”€ */
    .thank-you { text-align: center; }
    .thank-you h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold); margin-bottom: 1rem; }
    .thank-you p { font-size: 1.1rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 2rem; }

    @media (max-width: 768px) {
      .question-block { font-size: 1.2rem; }
      .option-btn { font-size: 0.95rem; padding: 1rem 1.25rem; }
      header { padding: 1rem; }
      .progress-bar { width: 100px; }
      input[type="text"], input[type="email"], input[type="tel"] { font-size: 1.2rem; }
    }
  </style>

</head>
<body>

  <header>
    <div class="logo">
      <img src="vidi_logo.png" alt="Logo" style="height: 60px; object-fit: contain;">
      ViDi
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">0%</div>
    </div>
  </header>

  <div id="app">
    <!-- Pasos serão gerados dinamicamente via JS -->
  </div>

  <script>
    // Configuração do Webhook (Google Apps Script, Make, Zapier, etc)
    const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbzsZ9A6I6J7gzTM3YgymdhCm3Irp9tLmsA9BYXCzT27vGH6zVbv_Ug53-qfKcwcxdkh/exec"; 

    const questions = [
      {
        id: "contato", type: "contact", title: "Para começar, onde podemos enviar o resultado do seu diagnóstico?",
        inputs: [
          { name: "nome", type: "text", placeholder: "Seu nome completo" },
          { name: "email", type: "email", placeholder: "Seu melhor e-mail" },
          { name: "whatsapp", type: "tel", placeholder: "Seu WhatsApp" }
        ]
      },
      {
        id: "papel", type: "choice", title: "Qual é o seu papel hoje na empresa?",
        options: ["CEO / Diretor", "Gerente", "Outro"]
      },
      {
        id: "objetivo", type: "choice", title: "Você está buscando algo para você, para o seu time ou para a empresa como um todo?",
        options: ["Para mim, como líder", "Para o meu time de liderança", "Para a empresa como um todo"]
      },
      {
        id: "faturamento", type: "choice", title: "Qual o faturamento mensal aproximado da sua empresa?",
        options: ["100 a 500 mil", "500 mil a 1 milhão", "1 a 2,5 milhões", "2,5 a 5 milhões", "Acima de 5 milhões"]
      },
      {
        id: "colaboradores", type: "choice", title: "Quantos colaboradores a empresa tem no total?",
        options: ["Até 10", "De 11 a 50", "De 51 a 200", "Mais de 200"]
      },
      {
        id: "momento_atual", type: "choice", title: "Qual dessas frases descreve melhor o seu momento atual na empresa?",
        options: [
          "Sei que preciso sair da operação, mas não sei por onde começar",
          "Preciso que meus líderes cresçam para a empresa escalar",
          "Preciso colocar ordem na casa: processos, metas e times",
          "Quero revisitar a estratégia para um próximo ciclo (expansão, exit, etc.)"
        ]
      },
      {
        id: "disponibilidade_presencial", type: "choice", title: "O evento acontecerá presencialmente em Brasília. Como é a sua disponibilidade para estar conosco?",
        options: [
          "Moro em Brasília ou região e tenho total disponibilidade",
          "Sou de fora, mas me organizo para estar presente com antecedência",
          "Gostaria de ir, mas a logística até Brasília hoje é um impedimento",
          "Prefiro eventos ou mentorias 100% online"
        ]
      }
    ];

    let currentStep = 0;
    const answers = {};
    const app = document.getElementById('app');

    // Inicializa identificador único de submissão
    answers['submission_id'] = 'sub_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

    // Captura automática de parâmetros UTM da URL (trata iframe caso o form esteja embarcado)
    let searchParams = window.location.search;
    if (window.self !== window.top && document.referrer) {
      try {
        const referrerUrl = new URL(document.referrer);
        if (referrerUrl.search) {
          searchParams = referrerUrl.search;
        }
      } catch (e) {
        console.error("Erro ao extrair parâmetros do referrer:", e);
      }
    }
    const urlParams = new URLSearchParams(searchParams);
    ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'].forEach(utm => {
      answers[utm] = urlParams.get(utm) || '';
    });

    function renderSteps() {
      app.innerHTML = '';
      
      questions.forEach((q, index) => {
        const stepDiv = document.createElement('div');
        stepDiv.className = `step-container ${index === 0 ? 'active' : ''}`;
        stepDiv.id = `step-${index}`;

        let contentHTML = `<div class="question-block">${q.title}</div>`;

        if (q.type === 'choice') {
          contentHTML += `<div class="options-grid">`;
          q.options.forEach((opt, i) => {
            const letter = String.fromCharCode(65 + i);
            contentHTML += `<button class="option-btn" onclick="selectOption(${index}, '${opt}')" id="btn-${index}-${i}">
                              <div class="option-letter">${letter}</div>
                              <div>${opt}</div>
                            </button>`;
          });
          contentHTML += `</div>`;
        } else if (q.type === 'text_long') {
          contentHTML += `<div class="input-wrap">
                            <textarea id="input-${index}" placeholder="${q.placeholder}" oninput="checkInput(${index})"></textarea>
                          </div>`;
        } else if (q.type === 'contact') {
          contentHTML += `<div class="input-wrap">`;
          q.inputs.forEach(inp => {
            contentHTML += `<input type="${inp.type}" id="input-${index}-${inp.name}" placeholder="${inp.placeholder}" oninput="checkInput(${index})">`;
          });
          contentHTML += `</div>`;
        }

        // Navigation
        contentHTML += `<div class="nav-buttons">`;
        if (index === questions.length - 1) {
          contentHTML += `<button class="btn-submit" id="next-${index}" disabled onclick="submitForm()">Finalizar Diagnóstico ✓</button>`;
        } else {
          contentHTML += `<button class="btn-next" id="next-${index}" disabled onclick="nextStep()">OK ✓</button>`;
          contentHTML += `<div class="nav-hint">Pressione Enter ↵</div>`;
        }
        if (index > 0) {
          contentHTML += `<button class="btn-prev" onclick="prevStep()">↑ Voltar</button>`;
        }
        contentHTML += `</div>`;

        stepDiv.innerHTML = contentHTML;
        app.appendChild(stepDiv);
      });
      
      // Thank you step
      const tyDiv = document.createElement('div');
      tyDiv.className = `step-container`;
      tyDiv.id = `step-thankyou`;
      tyDiv.innerHTML = `
        <div class="thank-you">
          <h2>Tudo pronto!</h2>
          <p>Seus dados foram recebidos. Nossa equipe estratégica vai analisar o seu perfil e entraremos em contato em breve com o diagnóstico.</p>
          <a href="#" onclick="location.reload(); return false;" class="btn-next" style="text-decoration:none;">Voltar para o início</a>
        </div>
      `;
      app.appendChild(tyDiv);

      updateProgress();
    }

    function selectOption(stepIndex, value) {
      const stepDiv = document.getElementById(`step-${stepIndex}`);
      const buttons = stepDiv.querySelectorAll('.option-btn');
      buttons.forEach(b => b.classList.remove('selected'));
      
      event.currentTarget.classList.add('selected');
      
      answers[questions[stepIndex].id] = value;
      document.getElementById(`next-${stepIndex}`).disabled = false;
      
      setTimeout(() => nextStep(), 400);
    }

    function checkInput(stepIndex) {
      const q = questions[stepIndex];
      let valid = true;
      
      if (q.type === 'text_long') {
        const val = document.getElementById(`input-${stepIndex}`).value;
        if (!val.trim()) valid = false;
        else answers[q.id] = val;
      } else if (q.type === 'contact') {
        q.inputs.forEach(inp => {
          const val = document.getElementById(`input-${stepIndex}-${inp.name}`).value;
          if (!val.trim()) valid = false;
          else answers[inp.name] = val; 
        });
      }

      document.getElementById(`next-${stepIndex}`).disabled = !valid;
    }

    let partialSubmitted = false;
    let globalDcLeadId = null;

    // --- INTEGRAÇÃO DATACRAZY ---
    const DC_CONFIG = {
      API_KEY: 'dc_eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhMjQzOWYxOTJkZmZhY2I5NmM2Y2Q0NiIsInRlbmFudElkIjoiMTMyODUzNWItM2E0Yi00ZDY0LTllYzUtYzc3ZjYyOTZmMmE1IiwibmFtZSI6IkNhcHRhw6fDo28gLSBUcsOhZmVnbyIsInJvbGVzIjpbImFkbWluIl0sImlzQWRtaW4iOnRydWUsImlhdCI6MTc4MDc1OTAyNiwiZXhwIjoxNzg4MTQ1MTk5fQ.zCrCLjo8WqauOTvoPKdoZIVrWo2GvfXcRBK3fjflGkg',
      STAGE_ID: '87af0c61-d406-4751-bb43-a3ca4a6abf68',
      SOURCE_LABEL: 'LP - Diagnóstico Estratégico',
      TAG_IDS: []
    };

    async function dcRequest(endpoint, method, body = null) {
      if (!DC_CONFIG.API_KEY || DC_CONFIG.API_KEY === 'SUA_CHAVE_DATACRAZY_AQUI') return null;
      const url = `https://api.g1.datacrazy.io/api/v1${endpoint}`;
      const options = {
        method: method,
        headers: {
          'Authorization': `Bearer ${DC_CONFIG.API_KEY}`,
          'Content-Type': 'application/json'
        }
      };
      if (body) options.body = JSON.stringify(body);
      
      try {
        const res = await fetch(url, options);
        if (res.status >= 200 && res.status < 300) {
          const text = await res.text();
          return text ? JSON.parse(text) : { success: true };
        } else {
          const err = await res.text();
          console.error(`DataCrazy Error (${res.status}):`, err);
          return null;
        }
      } catch (e) {
        console.error('DataCrazy Fetch Error:', e);
        return null;
      }
    }

    async function enviarDadosParciais() {
      if (partialSubmitted) return;
      partialSubmitted = true;
      console.log("Iniciando envio parcial dos dados...");
      
      // 1. Enviar para o Webhook do Google Sheets
      try {
        if (WEBHOOK_URL !== "SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI") {
          fetch(WEBHOOK_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              submission_id: answers.submission_id,
              nome: answers.nome,
              email: answers.email,
              whatsapp: answers.whatsapp,
              utm_source: answers.utm_source,
              utm_medium: answers.utm_medium,
              utm_campaign: answers.utm_campaign,
              utm_term: answers.utm_term,
              utm_content: answers.utm_content,
              data_envio: new Date().toISOString(),
              parcial: true
            })
          });
        }
      } catch (error) {
        console.error("Erro no envio parcial Sheets:", error);
      }

      // 2. Enviar Lead Parcial para o DataCrazy
      try {
        console.log("Iniciando envio parcial para DataCrazy CRM...");
        const leadBody = {
          name: answers.nome || 'Lead Sem Nome',
          email: answers.email,
          phone: answers.whatsapp ? answers.whatsapp.replace(/\D/g, '') : '',
          source: DC_CONFIG.SOURCE_LABEL,
          sourceReferral: { sourceUrl: window.location.href },
          tags: DC_CONFIG.TAG_IDS
        };
        
        const leadRes = await dcRequest('/leads', 'POST', leadBody);
        if (leadRes && leadRes.id) {
          globalDcLeadId = leadRes.id;
          console.log("Lead criado (parcial) no DataCrazy:", globalDcLeadId);
          
          const busBody = {
            leadId: globalDcLeadId,
            stageId: DC_CONFIG.STAGE_ID
          };
          await dcRequest('/businesses', 'POST', busBody);
          console.log("Negócio criado (parcial) no DataCrazy.");
        } else {
          const searchRes = await dcRequest('/leads?q=' + encodeURIComponent(answers.email), 'GET');
          if (searchRes && searchRes.data && searchRes.data.length > 0) {
            for (let i = 0; i < searchRes.data.length; i++) {
              if (searchRes.data[i].email && searchRes.data[i].email.toLowerCase() === answers.email.toLowerCase()) {
                globalDcLeadId = searchRes.data[i].id;
                console.log("Lead existente (parcial) encontrado:", globalDcLeadId);
                break;
              }
            }
          }
        }
      } catch (err) {
        console.error("Erro na integração parcial com DataCrazy:", err);
      }
    }

    function nextStep() {
      if (currentStep >= questions.length - 1) return;
      
      // Se estamos saindo da primeira etapa (contato), faz o envio parcial
      if (currentStep === 0) {
        enviarDadosParciais();
      }

      document.getElementById(`step-${currentStep}`).classList.remove('active');
      currentStep++;
      document.getElementById(`step-${currentStep}`).classList.add('active');
      updateProgress();
      
      const firstInput = document.querySelector(`#step-${currentStep} input, #step-${currentStep} textarea`);
      if(firstInput) firstInput.focus();
    }

    function prevStep() {
      if (currentStep <= 0) return;
      document.getElementById(`step-${currentStep}`).classList.remove('active');
      currentStep--;
      document.getElementById(`step-${currentStep}`).classList.add('active');
      updateProgress();
    }

    function updateProgress() {
      let pct = Math.round((currentStep / (questions.length - 1)) * 100);
      if (pct > 100) pct = 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').innerText = pct + '%';
    }

    let isSubmitting = false;

    async function submitForm() {
      if (isSubmitting) return;
      isSubmitting = true;

      document.getElementById(`next-${currentStep}`).innerText = "Enviando...";
      document.getElementById(`next-${currentStep}`).disabled = true;

      answers['data_envio'] = new Date().toISOString();
      answers['parcial'] = false;
      // submission_id já está no objeto answers

      // 1. Envio para o Webhook do Google Sheets (Fluxo Atual)
      try {
        console.log("Enviando dados do diagnóstico para o webhook:", answers);

        if (WEBHOOK_URL !== "SUA_URL_DO_GOOGLE_APPS_SCRIPT_AQUI") {
          fetch(WEBHOOK_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(answers)
          });
        }
      } catch (error) {
        console.error("Erro ao enviar para o Google Sheets:", error);
      }

      // 2. Integração DataCrazy
      try {
        console.log("Finalizando envio para DataCrazy CRM...");
        let leadId = globalDcLeadId;
        
        if (!leadId) {
          const leadBody = {
            name: answers.nome || 'Lead Sem Nome',
            email: answers.email,
            phone: answers.whatsapp ? answers.whatsapp.replace(/\D/g, '') : '',
            source: DC_CONFIG.SOURCE_LABEL,
            sourceReferral: { sourceUrl: window.location.href },
            tags: DC_CONFIG.TAG_IDS
          };
          
          const leadRes = await dcRequest('/leads', 'POST', leadBody);
          if (leadRes && leadRes.id) {
            console.log("Lead criado (fallback final) no DataCrazy:", leadRes.id);
            leadId = leadRes.id;
            
            const busBody = {
              leadId: leadId,
              stageId: DC_CONFIG.STAGE_ID
            };
            await dcRequest('/businesses', 'POST', busBody);
            console.log("Negócio criado (fallback final) no DataCrazy.");
          } else {
            console.log("Tentando buscar Lead existente (já cadastrado)...");
            const searchRes = await dcRequest('/leads?q=' + encodeURIComponent(answers.email), 'GET');
            if (searchRes && searchRes.data && searchRes.data.length > 0) {
              for (let i = 0; i < searchRes.data.length; i++) {
                if (searchRes.data[i].email && searchRes.data[i].email.toLowerCase() === answers.email.toLowerCase()) {
                  leadId = searchRes.data[i].id;
                  console.log("Lead existente encontrado (fallback):", leadId);
                  break;
                }
              }
            }
          }
        }
        
        if (leadId) {
          
          // Cria a nota com as respostas
          let noteText = "== RESPOSTAS DO DIAGNÓSTICO ==\n\n";
          const perguntas = {
            'papel': 'Papel na Empresa',
            'objetivo': 'Objetivo',
            'faturamento': 'Faturamento Mensal',
            'colaboradores': 'Número de Colaboradores',
            'momento_atual': 'Momento Atual da Empresa',
            'disponibilidade_presencial': 'Disponibilidade Presencial (Brasília)'
          };
          for (const [key, label] of Object.entries(perguntas)) {
            if (answers[key]) {
              noteText += `[${label.toUpperCase()}]\n>> ${answers[key]}\n\n`;
            }
          }
          const noteBody = { note: noteText };
          await dcRequest('/leads/' + leadId + '/notes', 'POST', noteBody);
          console.log("Nota criada no DataCrazy.");
        } else {
          console.error("Erro: Não foi possível criar ou encontrar o Lead no CRM.");
        }
      } catch (error) {
        console.error("Erro na integração com DataCrazy:", error);
      }

      // 3. Pixel da Meta, Tracking adicional e finalização da tela
      try {
        if (typeof fbq === 'function') {
          fbq('track', 'Lead');
        }
        if (window.__tp && typeof window.__tp.fireEvent === 'function') {
          window.__tp.fireEvent('Lead', {
            name: answers.nome,
            email: answers.email,
            phone: answers.whatsapp
          });
        }
      } catch (error) {
        console.error("Erro ao disparar Tracking (Meta ou Tp):", error);
      }

      document.getElementById(`step-${currentStep}`).classList.remove('active');
      document.getElementById('step-thankyou').classList.add('active');
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressText').innerText = '100%';
    }

    document.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        if (document.activeElement.tagName === 'TEXTAREA') return;
        const nextBtn = document.getElementById(`next-${currentStep}`);
        if (nextBtn && !nextBtn.disabled) {
          if (currentStep === questions.length - 1) submitForm();
          else nextStep();
        }
      }
    });

    renderSteps();
  </script>
</body>
</html>
